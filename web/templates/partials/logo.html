{{/* logo.html — Shared JellyGate logo partial */}}
{{ define "logo" }}
<div class="jg-sidebar-logo">
    <svg class="w-8 h-8" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="jg-logo-gradient" x1="0" y1="0" x2="32" y2="32">
                <stop style="stop-color: var(--jg-accent-cyan)" />
                <stop offset="1" style="stop-color: var(--jg-accent-emerald)" />
            </linearGradient>
        </defs>
        <circle cx="16" cy="16" r="14" fill="url(#jg-logo-gradient)" />
        <path d="M10 22V10l12 6-12 6z" fill="#fff" />
    </svg>
    <span>JellyGate</span>
</div>
{{ end }}
