name: i18n Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.23'
  # Default gate is now strict (0). Override with repo variable only if temporarily needed.
  MAX_SAME_AS_BASE: ${{ vars.I18N_MAX_SAME_AS_BASE || '0' }}

jobs:
  i18n-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Resolve Go cache paths
        shell: bash
        run: |
          echo "GOMODCACHE=$(go env GOMODCACHE)" >> "$GITHUB_ENV"
          echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"

      - name: Clean Go caches before restore
        shell: bash
        run: |
          rm -rf "$GOMODCACHE" "$GOCACHE"
          mkdir -p "$GOMODCACHE" "$GOCACHE"

      - name: Restore Go caches
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ steps.setup-go.outputs.go-version }}-

      - name: Download Go modules
        run: go mod download

      - name: Run structural i18n check
        run: go run ./cmd/i18ncheck

      - name: Run translation coverage gate
        run: go run ./cmd/i18ncoverage --max-same-as-base "${MAX_SAME_AS_BASE}"

      - name: Show threshold reminder
        run: |
          echo "Current MAX_SAME_AS_BASE=${MAX_SAME_AS_BASE}"
          echo "Strict mode enabled: expected value is 0"
