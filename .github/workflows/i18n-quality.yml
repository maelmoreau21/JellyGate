name: i18n Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Default gate follows the current non-regression baseline. Lower it toward 0 as locales are cleaned up.
  MAX_SAME_AS_BASE: ${{ vars.I18N_MAX_SAME_AS_BASE || '195' }}

jobs:
  i18n-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: false

      - name: Download Go modules
        run: go mod download

      - name: Run structural i18n check
        run: go run ./cmd/i18ncheck

      - name: Run translation coverage gate
        run: go run ./cmd/i18ncoverage --max-same-as-base "${MAX_SAME_AS_BASE}"

      - name: Show threshold reminder
        run: |
          echo "Current MAX_SAME_AS_BASE=${MAX_SAME_AS_BASE}"
          echo "Lower the threshold toward 0 as locale files are translated."
