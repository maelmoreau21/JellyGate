# =============================================================================
# JellyGate — Docker Publish (Multi-arch)
# =============================================================================
#
# Déclenché sur :
#   - Push sur main → tag "latest"
#   - Nouveau tag vX.Y.Z → tags "vX.Y.Z", "vX.Y", "vX", "latest"
#
# Compile pour linux/amd64 et linux/arm64 via QEMU + Docker Buildx.
# Publie sur GitHub Container Registry (ghcr.io).
# =============================================================================

name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  # Permet de lancer manuellement
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/maelmoreau21/jellygate

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. QEMU (émulation ARM pour cross-compilation) ───────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Docker Buildx ────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Connexion à GHCR ─────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extraction des métadonnées (tags + labels) ───────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Push sur main → latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag vX.Y.Z → vX.Y.Z, vX.Y, vX
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # SHA court pour traçabilité
            type=sha,prefix=sha-

      # ── 6. Build & Push multi-architecture ──────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
