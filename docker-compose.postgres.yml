services:
  jellygate:
    image: ghcr.io/maelmoreau21/jellygate:latest
    container_name: jellygate
    restart: unless-stopped
    ports:
      - "${JELLYGATE_PORT:-8097}:8097"
    volumes:
      - jellygate_data:/data
    env_file:
      - .env
    environment:
      # ── Application ──────────────────────────────────────────────────
      - JELLYGATE_PORT=8097
      - JELLYGATE_BASE_URL=${JELLYGATE_BASE_URL:-http://localhost:8097}
      - JELLYGATE_DATA_DIR=/data
      - JELLYGATE_SECRET_KEY=${JELLYGATE_SECRET_KEY:?❌ JELLYGATE_SECRET_KEY est requis}

      # ── Base SQL (PostgreSQL) ──────────────────────────────────────
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-jellygate}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-jellygate}
      - DB_NAME=${POSTGRES_DB:-jellygate}
      - DB_SSLMODE=${DB_SSLMODE:-disable}

      # ── Jellyfin ─────────────────────────────────────────────────────
      - JELLYFIN_URL=${JELLYFIN_URL:?❌ JELLYFIN_URL est requis}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:?❌ JELLYFIN_API_KEY est requis}

      # ── Intégrations portail optionnelles (liens/fallback) ──────────
      - JELLYSEERR_URL=${JELLYSEERR_URL:-}
      - JELLYSEERR_API_KEY=${JELLYSEERR_API_KEY:-}

    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8097/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:18-alpine
    container_name: jellygate-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-jellygate}
      - POSTGRES_USER=${POSTGRES_USER:-jellygate}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-jellygate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jellygate} -d ${POSTGRES_DB:-jellygate}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jellygate_data:
    driver: local
  postgres_data:
    driver: local
