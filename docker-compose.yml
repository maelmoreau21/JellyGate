services:
  jellygate:
    image: ghcr.io/maelmoreau21/jellygate:latest
    container_name: jellygate
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    ports:
      - "${JELLYGATE_PORT:-8097}:8097"
    volumes:
      - jellygate_data:/data
    env_file:
      - .env
    environment:
      # ── Application ──────────────────────────────────────────────────
      - JELLYGATE_PORT=8097
      - JELLYGATE_BASE_URL=${JELLYGATE_BASE_URL:-http://localhost:8097}
      - JELLYGATE_DATA_DIR=/data
      - JELLYGATE_SECRET_KEY=${JELLYGATE_SECRET_KEY:?❌ JELLYGATE_SECRET_KEY est requis}
      - JELLYGATE_DEFAULT_LANG=${JELLYGATE_DEFAULT_LANG:-fr}
      - JELLYGATE_ENABLE_DEBUG_ROUTES=${JELLYGATE_ENABLE_DEBUG_ROUTES:-false}
      - JELLYGATE_TRUST_PROXY_HEADERS=${JELLYGATE_TRUST_PROXY_HEADERS:-false}
      - JELLYGATE_ALLOW_INSECURE_LDAP_SKIP_VERIFY=${JELLYGATE_ALLOW_INSECURE_LDAP_SKIP_VERIFY:-false}
      # ── Base SQL (SQLite par défaut) ────────────────────────────────
      - DB_TYPE=sqlite
      # Note: Pour utiliser PostgreSQL, utilisez le fichier docker-compose.postgres.yml

      # ── Jellyfin ─────────────────────────────────────────────────────
      - JELLYFIN_URL=${JELLYFIN_URL:?❌ JELLYFIN_URL est requis}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:?❌ JELLYFIN_API_KEY est requis}

      # ── Intégrations portail optionnelles (liens/fallback) ──────────
      - JELLYSEERR_URL=${JELLYSEERR_URL:-}
      - JELLYSEERR_API_KEY=${JELLYSEERR_API_KEY:-}

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8097/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  jellygate_data:
    driver: local
