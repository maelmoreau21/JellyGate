services:
  jellygate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jellygate
    restart: unless-stopped
    ports:
      - "${JELLYGATE_PORT:-8097}:8097"
    volumes:
      - jellygate_data:/data
    env_file:
      - .env
    environment:
      # в”Ђв”Ђ Application в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - JELLYGATE_PORT=8097
      - JELLYGATE_BASE_URL=${JELLYGATE_BASE_URL:-http://localhost:8097}
      - JELLYGATE_DATA_DIR=/data
      - JELLYGATE_SECRET_KEY=${JELLYGATE_SECRET_KEY:?вќЊ JELLYGATE_SECRET_KEY est requis}
      - JELLYGATE_DEFAULT_LANG=${JELLYGATE_DEFAULT_LANG:-fr}

      # в”Ђв”Ђ Jellyfin в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - JELLYFIN_URL=${JELLYFIN_URL:?вќЊ JELLYFIN_URL est requis}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:?вќЊ JELLYFIN_API_KEY est requis}

      # в”Ђв”Ђ LDAP / Synology Active Directory в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - LDAP_HOST=${LDAP_HOST:?вќЊ LDAP_HOST est requis}
      - LDAP_PORT=${LDAP_PORT:-636}
      - LDAP_USE_TLS=${LDAP_USE_TLS:-true}
      - LDAP_SKIP_VERIFY=${LDAP_SKIP_VERIFY:-false}
      - LDAP_BIND_DN=${LDAP_BIND_DN:?вќЊ LDAP_BIND_DN est requis}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD:?вќЊ LDAP_BIND_PASSWORD est requis}
      - LDAP_BASE_DN=${LDAP_BASE_DN:?вќЊ LDAP_BASE_DN est requis}
      - LDAP_USER_OU=${LDAP_USER_OU:-CN=Users}
      - LDAP_USER_GROUP=${LDAP_USER_GROUP:-}
      - LDAP_DOMAIN=${LDAP_DOMAIN:?вќЊ LDAP_DOMAIN est requis}

      # в”Ђв”Ђ SMTP в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - SMTP_HOST=${SMTP_HOST:?вќЊ SMTP_HOST est requis}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:?вќЊ SMTP_USERNAME est requis}
      - SMTP_PASSWORD=${SMTP_PASSWORD:?вќЊ SMTP_PASSWORD est requis}
      - SMTP_FROM=${SMTP_FROM:?вќЊ SMTP_FROM est requis}
      - SMTP_TLS=${SMTP_TLS:-true}

      # в”Ђв”Ђ Webhooks (optionnels) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - WEBHOOK_DISCORD_URL=${WEBHOOK_DISCORD_URL:-}
      - WEBHOOK_TELEGRAM_TOKEN=${WEBHOOK_TELEGRAM_TOKEN:-}
      - WEBHOOK_TELEGRAM_CHAT_ID=${WEBHOOK_TELEGRAM_CHAT_ID:-}
      - WEBHOOK_MATRIX_URL=${WEBHOOK_MATRIX_URL:-}
      - WEBHOOK_MATRIX_ROOM_ID=${WEBHOOK_MATRIX_ROOM_ID:-}
      - WEBHOOK_MATRIX_TOKEN=${WEBHOOK_MATRIX_TOKEN:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8097/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  jellygate_data:
    driver: local
